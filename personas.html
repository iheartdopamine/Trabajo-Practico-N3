<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 2: Personas (JS)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Ejercicio 2: Personas (JavaScript)</h1>
    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="flexbox.html">Ejercicio 1: Flexbox</a></li>
        <li><a href="personas.html">Ejercicio 2: Personas (JS)</a></li>
        <li><a href="react.html">Ejercicio 3: Personas (React)</a></li>
      </ul>
    </nav>
  </header>
  <form id="form-personas" class="form-personas">
  <div class="campo-form">
    <label for="nombre">Nombre</label>
    <input type="text" id="nombre" name="nombre" required>
  </div>

  <div class="campo-form">
    <label for="apellido">Apellido</label>
    <input type="text" id="apellido" name="apellido" required>
  </div>

  <div class="campo-form">
    <label for="edad">Edad</label>
    <input type="number" id="edad" name="edad" min="0" max="120" required>
  </div>

  <div class="campo-form">
    <label for="altura">Altura (m)</label>
    <input type="number" id="altura" name="altura" min="0.3" max="2.5" step="0.01" required>
  </div>

  <div class="campo-form">
    <label for="peso">Peso (kg)</label>
    <input type="number" id="peso" name="peso" min="1" max="400" step="0.1" required>
  </div>

  <button type="submit">Agregar persona</button>
</form>
<table class="tabla-personas">
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Apellido</th>
      <th>Edad</th>
      <th>Altura (m)</th>
      <th>Peso (kg)</th>
      <th>IMC</th>
      <th>Acción</th>
    </tr>
  </thead>
  <tbody id="cuerpo-tabla-personas"></tbody>
</table>

<script src="personas.js"></script>
</body>
</html>
